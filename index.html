<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anish's Trees</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary:   #f8f6f2;
      --bg-card:      #ffffff;
      --bg-hero:      linear-gradient(168deg, #e8f4f0 0%, #f8f6f2 40%, #faf8f5 100%);
      --text-primary:   #2c3e3a;
      --text-secondary: #4a5d58;
      --text-muted:     #8a9691;
      --accent:       #3d8b7a;
      --accent-hover: #327264;
      --accent-light: #e8f4f0;
      --accent-soft:  #d0e8e1;
      --warm:         #c9a96e;
      --border:       #e2ddd5;
      --border-light: #ede9e3;
      --shadow-sm: 0 1px 3px  rgba(44,62,58,0.06);
      --shadow:    0 4px 16px rgba(44,62,58,0.08);
      --shadow-lg: 0 8px 32px rgba(44,62,58,0.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      line-height: 1.7;
      min-height: 100vh;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .fade-up { animation: none; opacity: 1; transform: none; }
    }

    .fade-up {
      animation: fadeUp 0.6s ease both;
    }

    /* ── Layout ── */
    .page {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Header ── */
    header {
      padding: 48px 0 40px;
    }

    .site-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 400;
      color: var(--text-primary);
      letter-spacing: 0.06em;
    }

    .site-title span {
      color: var(--accent);
    }

    .tagline {
      font-family: 'Jost', sans-serif;
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* ── Image card ── */
    .image-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      animation: fadeUp 0.6s ease 0.1s both;
    }

    .image-card img {
      width: 100%;
      display: block;
      object-fit: cover;
      max-height: 70vh;
    }

    .image-caption {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .image-caption svg {
      flex-shrink: 0;
      color: var(--accent);
    }

    .image-caption p {
      font-size: 0.88rem;
      color: var(--text-muted);
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
    }

    /* ── Divider ── */
    .section-divider {
      width: 48px;
      height: 2px;
      background: var(--accent-soft);
      margin: 40px 0;
      border: none;
    }

    /* ── Footer ── */
    footer {
      padding: 48px 0 56px;
      color: var(--text-muted);
      font-size: 0.82rem;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 32px 0 28px; }
      .page { padding: 0 16px; }
      .image-card img { max-height: 60vh; }
      .section-divider { margin: 28px 0; }
      footer { padding: 32px 0 40px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="fade-up">
      <h4 class="site-title"><a href="http://anish.dentist" style="color: inherit; text-decoration: none;">http://anish<span>.dentist</span></a>></h4>
      <p class="tagline">Steve @ Crown Tree Services,</p>
    </header>

    <main>
      <div class="image-card">
        <img src="tree.jpg" alt="Garden in summer sunshine — trees and shrubs against a wooden fence on a clear blue day">
        <div class="image-caption">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <p>May 2026 - Elder tree to the left, firs to the right. Please could you also prune the middle tree? Thanks, Anish</p>
        </div>
      </div>

      <div class="section-divider" aria-hidden="true"></div>
    </main>

    <footer>
      <p>&copy; 2026 Anish Kothari</p>
    </footer>
  </div>
</body>
</html>
